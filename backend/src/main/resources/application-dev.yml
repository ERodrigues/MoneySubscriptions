spring:
  datasource:
    url: ${DATABASE_URL:jdbc:sqlite:./data/money-subscriptions-dev.sqlite}
    driver-class-name: org.sqlite.JDBC
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.community.dialect.SQLiteDialect
        format_sql: true
        jdbc:
          time_zone: UTC
  flyway:
    placeholders:
      uuid_type: TEXT
      money_type: NUMERIC

logging:
  level:
    com.moneysubscriptions: DEBUG
