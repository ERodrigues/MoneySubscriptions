services:
  backend:
    build:
      context: ../backend
    environment:
      SPRING_PROFILES_ACTIVE: dev
      DATABASE_URL: jdbc:sqlite:/app/data/money-subscriptions-dev.sqlite
      SERVER_PORT: 8080
    ports:
      - "8080:8080"
    volumes:
      - backend-sqlite:/app/data

  frontend:
    build:
      context: ../frontend
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8080/api/v1
    ports:
      - "3000:3000"
    depends_on:
      - backend

  postgres:
    image: postgres:18.4
    profiles:
      - prod-like
    environment:
      POSTGRES_DB: money_subscriptions
      POSTGRES_USER: money_subscriptions
      POSTGRES_PASSWORD: money_subscriptions
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  backend-sqlite:
  postgres-data:
